<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Slicer development workspace built with Three.js." />
  <title>Slicer</title>
</head>
<body>
  <div id="app" class="app-shell">
    <div class="scene-frame" data-scene-root="true"></div>

    <aside class="hud">
      <h3>Controls</h3>
      <ul>
        <li>Orbit: Left Drag</li>
        <li>Pan: Right Drag</li>
        <li>Zoom: Wheel</li>
      </ul>
    </aside>

    <aside class="tool-rail">
      <div class="tool-rail__group" role="toolbar" aria-label="View tools">
        <button id="tool-wireframe" type="button" class="tool-button" aria-label="Wireframe" aria-pressed="false" title="Wireframe">
          <svg viewBox="0 0 24 24" aria-hidden="true" class="tool-button__icon">
            <path d="M6 8.5 12 5l6 3.5v7L12 19l-6-3.5z" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/>
            <path d="M6 8.5 12 12l6-3.5M12 12v7" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
    </aside>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
