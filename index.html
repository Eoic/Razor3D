<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Slicer development workspace built with Three.js." />
  <title>Slicer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@300;400;700&display=swap" rel="stylesheet" />
  <script src="https://kit.fontawesome.com/ad3b985a78.js" crossorigin="anonymous"></script>
</head>
<body>
  <div id="app" class="app-shell">
    <div class="scene-frame" data-scene-root="true"></div>

    <button id="btn-home-view" type="button" class="action-button" aria-label="Reset camera" title="Reset camera">
      <i class="fa-solid fa-house"></i>
    </button>

    <aside class="tool-rail">
      <div class="tool-rail__group" role="toolbar" aria-label="View tools">
        <button id="tool-wireframe" type="button" class="tool-button" aria-label="Wireframe" aria-pressed="false" title="Wireframe">
          <i class="fa-solid fa-cube"></i>
        </button>
        <button id="tool-theme-toggle" type="button" class="tool-button" aria-label="Toggle light mode" aria-pressed="true" data-active="true" title="Toggle light mode">
          <i class="fa-solid fa-sun"></i>
        </button>
      </div>
    </aside>

    <aside class="scene-tree">
      <h3 class="scene-tree__title">Scene</h3>
      <ul class="scene-tree__list" role="tree" aria-label="Scene objects">
      </ul>
    </aside>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
